name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build cross-platform binaries (same as release, to catch failures early)
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          # Android targets
          - os: ubuntu-latest
            goos: android
            goarch: arm64
            output_name: libwhatsapp-rpc-android-arm64.so
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output_name: libwhatsapp-rpc-android-x86_64.so
            is_android_emu: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          if [ -n "${{ matrix.output_name }}" ]; then
            output_name="${{ matrix.output_name }}"
          else
            ext=""
            if [ "${{ matrix.goos }}" = "windows" ]; then
              ext=".exe"
            fi
            output_name="whatsapp-rpc-server-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          fi
          echo "Building ${output_name}..."
          go build -ldflags="-s -w" -o "${output_name}" ./src/go/cmd/server
          ls -la "${output_name}"

      - name: Run tests
        if: (matrix.goos == 'linux' && matrix.goarch == 'amd64') || (matrix.goos == 'windows' && matrix.goarch == 'amd64')
        run: go test -v ./src/go/...

  # Check version consistency across all package files
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify versions match
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          PYPI_VERSION=$(grep '^version = ' src/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          echo "npm version:    $NPM_VERSION"
          echo "pypi version:   $PYPI_VERSION"

          if [ "$NPM_VERSION" != "$PYPI_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($NPM_VERSION) != pyproject.toml ($PYPI_VERSION)"
            exit 1
          fi
          echo "All versions match: $NPM_VERSION"

  # Validate npm package
  build-npm:
    name: Build npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify package contents
        run: npm pack --dry-run

  # Test Docker build
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: whatsapp-rpc:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 9400:9400 whatsapp-rpc:test
          sleep 5
          docker logs test-container
          docker stop test-container

  # Validate Python package
  build-python:
    name: Build Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: src/python
        run: python -m build

      - name: Check package
        working-directory: src/python
        run: twine check dist/*
